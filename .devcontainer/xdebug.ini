xdebug.mode=develop,debug
# Cambiamos 'trigger' por 'yes' para que escuche siempre. Si prefieres usar la extensión del navegador, déjalo en 'trigger'.
xdebug.start_with_request=yes
# Descubrimiento automático de la IP de tu máquina (Ideal para Linux)
xdebug.discover_client_host=1
xdebug.client_host=172.17.0.1
xdebug.client_port=9003
xdebug.log_level=0
# Evita retrasos en las conexiones de Xdebug
xdebug.idekey=VSCODE